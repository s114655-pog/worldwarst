<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>史上最糟糕的網站!!!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #ea0000;
            margin: 0;
        }

        .container {
            text-align: center;
            background-color: rgb(64, 255, 0);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgb(255, 0, 0);
            max-width: 90%;
        }

        h1 {
            color: #a10000;
            margin-bottom: 20px;
            font-size: 24px;
        }

        /* 按鈕樣式 */
        .btn {
            background-color: #ff0000;
            color: rgb(213, 213, 213);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #73ff00;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* 圖片容器與動畫 */
        #imageContainer {
            margin-top: 25px;
            display: none; /* 預設隱藏 */
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* 當加入 .show 類別時顯示並播放動畫 */
        #imageContainer.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        #displayImage {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>點擊下方按鈕顯示圖片</h1>
        
        <button class="btn" onclick="showImage()">秀出圖片！</button>

        <div id="imageContainer">
            <img id="displayImage" src="404.png" alt="快出來的圖片">
        </div>
    </div>

    <script>
        function showImage() {
            const container = document.getElementById('imageContainer');
            
            // 切換顯示狀態
            if (container.classList.contains('show')) {
                // 如果已經顯示，就隱藏
                container.classList.remove('show');
                setTimeout(() => {
                    container.style.display = 'none';
                }, 500); // 等待淡出動畫結束
            } else {
                // 如果是隱藏的，就顯示
                container.style.display = 'block';
                // 稍微延遲讓瀏覽器有時間反應 display 的改變，進而觸發動畫
                setTimeout(() => {
                    container.classList.add('show');
                }, 10);
            }
        }
    </script>

</body>
</html>
